<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

<h2>체험 프로그램 목록</h2>

<input type="checkbox" name="stage" th:value="진행예정">&nbsp;
<input type="checkbox" name="stage" th:value="진행중">&nbsp;
<input type="checkbox" name="stage" th:value="종료">

<ul>
    <li th:each="program : ${programs}">
        <strong th:text="${program.title}"></strong>
        <span th:text="'(' + ${program.stage} + ')'"></span>
    </li>
</ul>

</body>
</html>
</body>
</html>
